<!DOCTYPE html>
<html>
    <head>
        <title>campus navigation </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Campus Navigation System</h1>
        <div id="setup">
        <h2>Enter your Schedule</h2>
        
        <select>
            <option id="Monday">Monday</option>
            <option id="Tuesday">Tuesday</option>
            <option id="Wednesday">Wednesday</option>
            <option id="Thursday">Thursday</option>
            <option id="Friday">Friday</option>
            <option id="Saturday">Saturday</option>
            <option id="Sunday">Sunday</option>
        </select>
        <input type="text" id="subject" placeholder="Subject Name">
        <input type="time" id="start" placeholder="start">
        <input type="time" id="end" placeholder="end">
        <input type="location" id="location" placeholder="Room NO.">
        
        <button onclick="AddClass()">Add Class</button>
        <button onclick="Save()">Save</button>
        </div>
        <br>
        <div id="output">
            <h2>Output...</h2>
        </div>
        <script src="script.js"></script>
    </body>
</html>
